<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="style.css">
    <title>Todo List</title>

</head>

<body>
    <div id="MainContainer">
        <div id="ListDiv" class="panel">
            <h1>TODO LISTA</h1>
            <h3>Szymon Borzdyński</h3>
            <input type="text" id="input_field1" placeholder="Tekst notatki">
            <span onclick="add_new_note()" class="add_item_button">Dodaj</span>
        </div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <span onclick="close_del()" class="close">&times;</span>
            <p>Czy na pewno chcesz usunąć zadanie o treści: <span id="task-text"></span></p>
            <button onclick="confirm_del()" class="confirm-delete">Tak</button>
            <button onclick="cancel_del()" class="cancel-delete">Nie</button>
        </div>
    </div>
    

    <ul id="note_list">
        <!-- <li>test 1</li> -->
    </ul>

    <script src="script.js"></script>
</body>

</html>
